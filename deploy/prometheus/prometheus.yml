# =====================================================================
# Prometheus configuration — Fund Quant Platform
#
# Scrape layout (design §6 / requirement 8.5):
#   • self       — prometheus scrapes itself for uptime/query metrics
#   • api        — FastAPI backend, exposes /metrics via
#                  prometheus-fastapi-instrumentator (see
#                  `backend/app/observability/instrumentation.py`)
#
# Worker / beat do not yet expose a Prometheus endpoint; task 6.4 adds
# a Celery exporter and expands this file.
# =====================================================================

global:
  scrape_interval: 15s          # Grafana dashboards assume 15s step.
  evaluation_interval: 15s
  external_labels:
    environment: ${APP_ENV:-production}
    platform: fund-quant

# Alertmanager integration (task 6.5 / requirement 8.4, 8.7).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fqp-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
          component: backend
