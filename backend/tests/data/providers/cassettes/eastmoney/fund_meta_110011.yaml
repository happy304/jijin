        \                               <div class=\"boxitem w790\">\r\n                                    <h4
        class=\"t\">\r\n                                        <label class=\"left\">\u6295\u8D44\u8303\u56F4</label><label
        class=\"right\"></label></h4>\r\n                                    <div
        class=\"space0\"></div>\r\n                                    \r\n                                    <p>\r\n
        \                                       1\u3001\u5185\u5730\u5E02\u573A\u6295\u8D44\u5DE5\u5177,\u5305\u62EC\u4F9D\u6CD5\u53D1\u884C\u4E0A\u5E02\u7684\u80A1\u7968(\u5305\u62EC\u521B\u4E1A\u677F\u3001\u79D1\u521B\u677F\u4EE5\u53CA\u5176\u4ED6\u4F9D\u6CD5\u53D1\u884C\u4E0A\u5E02\u7684\u80A1\u7968\u3001\u5B58\u6258\u51ED\u8BC1)\u3001\u503A\u5238(\u5305\u62EC\u56FD\u503A\u3001\u592E\u884C\u7968\u636E\u3001\u5730\u65B9\u653F\u5E9C\u503A\u3001\u91D1\u878D\u503A\u3001\u4F01\u4E1A\u503A\u3001\u516C\u53F8\u503A\u3001\u6B21\u7EA7\u503A\u3001\u4E2D\u671F\u7968\u636E\u3001\u77ED\u671F\u878D\u8D44\u5238\u3001\u53EF\u8F6C\u6362\u503A\u5238\u3001\u53EF\u4EA4\u6362\u503A\u5238\u7B49),\u8D44\u4EA7\u652F\u6301\u8BC1\u5238\u3001\u503A\u5238\u56DE\u8D2D\u3001\u94F6\u884C\u5B58\u6B3E\u3001\u540C\u4E1A\u5B58\u5355\u3001\u8D27\u5E01\u5E02\u573A\u5DE5\u5177\u3001\u884D\u751F\u5DE5\u5177(\u5305\u62EC\u80A1\u6307\u671F\u8D27\u3001\u56FD\u503A\u671F\u8D27\u3001\u80A1\u7968\u671F\u6743\u7B49),\u4EE5\u53CA\u6CD5\u5F8B\u6CD5\u89C4\u6216\u4E2D\u56FD\u8BC1\u76D1\u4F1A\u5141\u8BB8\u57FA\u91D1\u6295\u8D44\u7684\u5176\u4ED6\u91D1\u878D\u5DE5\u5177;\r\n2\u3001\u9999\u6E2F\u5E02\u573A\u6295\u8D44\u5DE5\u5177,\u5305\u62EC\u5185\u5730\u4E0E\u9999\u6E2F\u80A1\u7968\u5E02\u573A\u4EA4\u6613\u4E92\u8054\u4E92\u901A\u673A\u5236\u5141\u8BB8\u4E70\u5356\u7684\u9999\u6E2F\u8BC1\u5238\u5E02\u573A\u80A1\u7968(\u4EE5\u4E0B\u7B80\u79F0\u201C\u6E2F\u80A1\u901A\u201D\u6216\u201C\u6E2F\u80A1\u901A\u80A1\u7968\u201D),\u6E2F\u80A1\u901A\u4EE5\u5916\u7684\u9999\u6E2F\u8BC1\u5238\u5E02\u573A\u6302\u724C\u4EA4\u6613\u7684\u666E\u901A\u80A1\u3001\u4F18\u5148\u80A1\u3001\u5B58\u6258\u51ED\u8BC1,\u4EE5\u53CA\u6CD5\u5F8B\u6CD5\u89C4\u6216\u4E2D\u56FD\u8BC1\u76D1\u4F1A\u5141\u8BB8\u57FA\u91D1\u6295\u8D44\u7684\u5176\u4ED6\u91D1\u878D\u5DE5\u5177\u3002\r\n\u5982\u6CD5\u5F8B\u6CD5\u89C4\u6216\u76D1\u7BA1\u673A\u6784\u4EE5\u540E\u5141\u8BB8\u57FA\u91D1\u6295\u8D44\u5176\u4ED6\u54C1\u79CD,\u57FA\u91D1\u7BA1\u7406\u4EBA\u5728\u5C65\u884C\u9002\u5F53\u7A0B\u5E8F\u540E,\u53EF\u4EE5\u5C06\u5176\u7EB3\u5165\u6295\u8D44\u8303\u56F4\u3002\r\n
        \                                   </p>\r\n                                </div>\r\n
        \                           </div>\r\n                            <div class=\"box\">\r\n
        \                               <div class=\"boxitem w790\">\r\n                                    <h4
        class=\"t\">\r\n                                        <label class=\"left\">\u6295\u8D44\u7B56\u7565</label><label
        class=\"right\"></label></h4>\r\n                                    <div
        class=\"space0\"></div>\r\n                                    \r\n                                    <p>\r\n
        \                                       \u8D44\u4EA7\u914D\u7F6E\u7B56\u7565\r\n\u672C\u57FA\u91D1\u7ED3\u5408\u5B8F\u89C2\u7ECF\u6D4E\u4E0E\u5E02\u573A\u5206\u6790,\u8BC4\u4F30\u5404\u7C7B\u8D44\u4EA7\u7684\u9884\u671F\u6536\u76CA\u4E0E\u98CE\u9669,\u5728\u57FA\u91D1\u5408\u540C\u7EA6\u5B9A\u7684\u8303\u56F4\u5185,\u786E\u5B9A\u7EC4\u5408\u4E2D\u80A1\u7968\u3001\u503A\u5238\u3001\u8D27\u5E01\u5E02\u573A\u5DE5\u5177\u53CA\u5176\u4ED6\u91D1\u878D\u5DE5\u5177\u7684\u6BD4\u4F8B\u3002\n\u80A1\u7968\u6295\u8D44\u7B56\u7565\r\n(1)\u4F01\u4E1A\u7CBE\u9009\r\n\u672C\u57FA\u91D1\u57FA\u4E8E\u6DF1\u5EA6\u7684\u7814\u7A76\u5206\u6790,\u5728\u5185\u5730\u548C\u9999\u6E2F\u5E02\u573A\u7CBE\u9009\u5177\u6709\u826F\u597D\u6CBB\u7406\u7ED3\u6784\u3001\u5728\u7EC6\u5206\u884C\u4E1A\u5177\u6709\u7ADE\u4E89\u4F18\u52BF\u4EE5\u53CA\u6709\u8F83\u9AD8\u6210\u957F\u6027\u7684\u4F18\u8D28\u4F01\u4E1A\u3002\r\n\u672C\u57FA\u91D1\u7BA1\u7406\u4EBA\u5BF9\u62DF\u6295\u8D44\u7684\u4E0A\u5E02\u4F01\u4E1A\u8FDB\u884C\u900F\u5F7B\u7684\u5206\u6790,\u6309\u4EE5\u4E0B\u5206\u6790\u6807\u51C6\u7CBE\u9009\u6295\u8D44\u6807\u7684:\r\n1)\u5177\u6709\u8F83\u9AD8\u6210\u957F\u6027\r\n\u672C\u57FA\u91D1\u5C06\u91CD\u70B9\u6295\u8D44\u9884\u671F\u672A\u6765\u4E1A\u7EE9\u53EF\u6301\u7EED\u589E\u957F\u7684\u4F01\u4E1A\u3002\r\n\u4F01\u4E1A\u4E1A\u7EE9\u7684\u53EF\u6301\u7EED\u589E\u957F\u6307\u7684\u662F\u4F01\u4E1A\u51C0\u5229\u6DA6\u7684\u589E\u957F\u5177\u6709\u53EF\u6301\u7EED\u6027,\u5176\u52A8\u529B\u4E3B\u8981\u6765\u81EA:\u884C\u4E1A\u5904\u4E8E\u6210\u957F\u5468\u671F\u6216\u8005\u51FA\u73B0\u884C\u4E1A\u666F\u6C14;\u4F01\u4E1A\u901A\u8FC7\u6539\u8FDB\u7BA1\u7406\u6765\u964D\u4F4E\u80FD\u8017\u548C\u751F\u4EA7\u6210\u672C,\u63D0\u9AD8\u4EA7\u80FD\u5229\u7528\u7387;\u4F01\u4E1A\u52A0\u5927\u8425\u9500\u529B\u5EA6,\u5F00\u62D3\u65B0\u5E02\u573A;\u5F00\u53D1\u4E0E\u5F15\u8FDB\u65B0\u6280\u672F;\u65B0\u5EFA\u4EA7\u80FD\u4EE5\u53CA\u6536\u8D2D\u5916\u90E8\u751F\u4EA7\u80FD\u529B\u7B49\u3002\r\n2)\u5728\u7EC6\u5206\u884C\u4E1A\u5177\u6709\u8F83\u5F3A\u7684\u7ADE\u4E89\u4F18\u52BF\r\n\u672C\u57FA\u91D1\u4F18\u5148\u6295\u8D44\u7EC6\u5206\u884C\u4E1A\u7684\u9F99\u5934\u4F01\u4E1A,\u5373\u5728\u7EC6\u5206\u884C\u4E1A\u4E2D\u5E02\u573A\u5360\u6709\u7387\u53CA\u76C8\u5229\u80FD\u529B\u7EFC\u5408\u6307\u6807\u4F4D\u5C45\u524D\u5217\u7684\u4F01\u4E1A,\u4E5F\u5305\u62EC\u7ECF\u8FC7\u5FEB\u901F\u6210\u957F\u5373\u5C06\u6210\u4E3A\u7EC6\u5206\u884C\u4E1A\u9F99\u5934\u7684\u4F01\u4E1A,\u800C\u4E14\u8BE5\u884C\u4E1A\u5177\u6709\u8F83\u5927\u7684\u53D1\u5C55\u7A7A\u95F4,\u884C\u4E1A\u666F\u6C14\u5EA6\u8F83\u9AD8;\r\n\u4F01\u4E1A\u76C8\u5229\u80FD\u529B\u8F83\u5F3A,\u9500\u552E\u6BDB\u5229\u7387\u6216\u51C0\u8D44\u4EA7\u6536\u76CA\u7387\u4F4D\u5C45\u884C\u4E1A\u524D\u5217,\u4E14\u56E0\u4F01\u4E1A\u72EC\u7279\u7684\u7ADE\u4E89\u4F18\u52BF,\u4F01\u4E1A\u7684\u9AD8\u76C8\u5229\u6C34\u5E73\u6709\u671B\u957F\u671F\u4FDD\u6301;\r\n\u4F01\u4E1A\u62E5\u6709\u7BA1\u7406\u80FD\u529B\u8F83\u5F3A\u7684\u7ECF\u8425\u56E2\u961F,\u7BA1\u7406\u5C42\u7A33\u5B9A\u3001\u56E2\u7ED3\u3001\u656C\u4E1A\u3001\u4E13\u4E1A\u3001\u8BDA\u4FE1,\u80FD\u5E26\u9886\u4F01\u4E1A\u4E0D\u65AD\u6210\u957F,\u800C\u4E14\u4F01\u4E1A\u5EFA\u7ACB\u4E86\u5BF9\u7BA1\u7406\u5C42\u6709\u6548\u6FC0\u52B1\u7EA6\u675F\u7684\u673A\u5236\u4F53\u7CFB;\r\n\u7ECF\u8425\u7BA1\u7406\u673A\u5236\u5065\u5168\u6709\u6548,\u80FD\u6839\u636E\u5E02\u573A\u53D8\u5316\u53CA\u65F6\u8C03\u6574\u7ECF\u8425\u6218\u7565,\u5DF2\u5F62\u6210\u6216\u521D\u6B65\u5F62\u6210\u8F83\u5B8C\u5907\u7684\u751F\u4EA7\u7BA1\u7406\u3001\u6210\u672C\u7BA1\u7406\u3001\u85AA\u916C\u7BA1\u7406\u3001\u6280\u672F\u5F00\u53D1\u7BA1\u7406\u3001\u8425\u9500\u7BA1\u7406\u7B49\u7BA1\u7406\u4F53\u7CFB;\r\n\u8425\u9500\u673A\u5236\u7075\u6D3B,\u5177\u6709\u8F83\u5F3A\u7684\u5E02\u573A\u5F00\u62D3\u80FD\u529B;\r\n\u901A\u8FC7\u81EA\u4E3B\u5F00\u53D1\u6216\u5F15\u8FDB\u5148\u8FDB\u6280\u672F,\u5728\u67D0\u4E00\u9886\u57DF\u5F62\u6210\u6280\u672F\u9886\u5148\u4F18\u52BF;\r\n\u8D22\u52A1\u7A33\u5065,\u76F8\u5BF9\u540C\u884C\u4E1A\u5176\u4ED6\u4F01\u4E1A,\u8D44\u4EA7\u8D1F\u503A\u7387\u3001\u77ED\u671F\u507F\u503A\u80FD\u529B\u90FD\u5904\u4E8E\u5408\u7406\u6C34\u5E73,\u5E94\u6536\u8D26\u6B3E\u5468\u8F6C\u7387\u8F83\u9AD8\u3001\u574F\u8D26\u7387\u8F83\u4F4E\u3002\r\n3)\u5177\u6709\u8F83\u597D\u7684\u4F01\u4E1A\u6CBB\u7406\u673A\u5236,\u5173\u5FC3\u793E\u4F1A\u80A1\u4E1C\u5229\u76CA\r\n\u4F01\u4E1A\u5177\u6709\u8F83\u597D\u7684\u6CBB\u7406\u7ED3\u6784,\u7BA1\u7406\u5C42\u5173\u5FC3\u793E\u4F1A\u80A1\u4E1C\u5229\u76CA,\u5728\u80A1\u606F\u5206\u6D3E\u3001\u878D\u8D44\u3001\u6536\u8D2D\u517C\u5E76\u3001\u5173\u8054\u4EA4\u6613\u3001\u9AD8\u7BA1\u53CA\u5458\u5DE5\u7684\u80A1\u6743\u6FC0\u52B1\u7B49\u653F\u7B56\u5236\u5B9A\u4E2D\u90FD\u5145\u5206\u8003\u8651\u5230\u793E\u4F1A\u80A1\u4E1C\u7684\u5229\u76CA\u3002\r\n(2)\u8BC4\u4F30\u4F01\u4E1A\u7684\u4F30\u503C\u6C34\u5E73\r\n\u672C\u57FA\u91D1\u7BA1\u7406\u4EBA\u5C06\u6839\u636E\u4F01\u4E1A\u6240\u5904\u7684\u884C\u4E1A,\u9009\u62E9\u9002\u5F53\u7684\u4F30\u503C\u65B9\u6CD5,\u5BF9\u4F01\u4E1A\u4EF7\u503C\u8FDB\u884C\u52A8\u6001\u8BC4\u4F30\u3002\u672C\u57FA\u91D1\u5C06\u5173\u6CE8\u540C\u7C7B\u4F01\u4E1A\u5728\u7C7B\u4F3C\u53D1\u5C55\u9636\u6BB5\u7684\u4F30\u503C\u6C34\u5E73,\u4EE5\u5224\u65AD\u8BE5\u4F01\u4E1A\u7684\u4F30\u503C\u662F\u5426\u5904\u4E8E\u5408\u7406\u533A\u95F4\u3002\r\n(3)\u80A1\u7968\u7EC4\u5408\u7684\u6784\u9020\r\n\u672C\u57FA\u91D1\u7BA1\u7406\u4EBA\u6839\u636E\u5BF9\u4F01\u4E1A\u7684\u6210\u957F\u6027\u3001\u7ADE\u4E89\u4F18\u52BF\u3001\u4F30\u503C\u6C34\u5E73\u548C\u884C\u4E1A\u524D\u666F\u7684\u7EFC\u5408\u5224\u65AD,\u8FDB\u884C\u80A1\u7968\u7EC4\u5408\u7684\u6784\u9020,\u5E76\u5145\u5206\u8003\u8651\u7EC4\u5408\u7684\u6D41\u52A8\u6027\u4EE5\u53CA\u6CE2\u52A8\u6027\u3002\r\n\u672C\u57FA\u91D1\u53EF\u6839\u636E\u6295\u8D44\u7B56\u7565\u9700\u8981\u6216\u4E0D\u540C\u5E02\u573A\u73AF\u5883\u7684\u53D8\u5316,\u9009\u62E9\u5C06\u90E8\u5206\u57FA\u91D1\u8D44\u4EA7\u6295\u8D44\u4E8E\u6E2F\u80A1,\u6216\u9009\u62E9\u4E0D\u5C06\u57FA\u91D1\u8D44\u4EA7\u6295\u8D44\u4E8E\u6E2F\u80A1,\u57FA\u91D1\u8D44\u4EA7\u5E76\u975E\u5FC5\u7136\u6295\u8D44\u6E2F\u80A1\u3002\n\u5B58\u6258\u51ED\u8BC1\u6295\u8D44\u7B56\u7565\r\n\u672C\u57FA\u91D1\u6295\u8D44\u5B58\u6258\u51ED\u8BC1\u7684\u7B56\u7565\u4F9D\u7167\u4E0A\u8FF0\u80A1\u7968\u6295\u8D44\u7B56\u7565\u6267\u884C\u3002\r\n\u672C\u57FA\u91D1\u8FD8\u53EF\u5728\u7B26\u5408\u6709\u5173\u6CD5\u5F8B\u6CD5\u89C4\u3001\u4E25\u683C\u63A7\u5236\u98CE\u9669\u7684\u524D\u63D0\u4E0B,\u8FDB\u884C\u8BC1\u5238\u501F\u8D37\u4EA4\u6613\u3001\u56DE\u8D2D\u4EA4\u6613\u3001\u878D\u8D44\u4EA4\u6613\u7B49\u3002\n\u8D44\u4EA7\u652F\u6301\u8BC1\u5238\u6295\u8D44\u7B56\u7565\r\n\u672C\u57FA\u91D1\u53EF\u5728\u7EFC\u5408\u8003\u8651\u9884\u671F\u6536\u76CA\u7387\u3001\u4FE1\u7528\u98CE\u9669\u3001\u6D41\u52A8\u6027\u7B49\u56E0\u7D20\u7684\u57FA\u7840\u4E0A,\u9009\u62E9\u6295\u8D44\u4EF7\u503C\u8F83\u9AD8\u7684\u8D44\u4EA7\u652F\u6301\u8BC1\u5238\u8FDB\u884C\u6295\u8D44\u3002\n\u56FD\u503A\u671F\u8D27\u6295\u8D44\u7B56\u7565\r\n\u672C\u57FA\u91D1\u53EF\u6295\u8D44\u56FD\u503A\u671F\u8D27\u3002\u82E5\u672C\u57FA\u91D1\u6295\u8D44\u56FD\u503A\u671F\u8D27,\u5C06\u6839\u636E\u98CE\u9669\u7BA1\u7406\u7684\u539F\u5219,\u7EFC\u5408\u8003\u8651\u6D41\u52A8\u6027\u3001\u57FA\u5DEE\u6C34\u5E73\u3001\u4E0E\u503A\u5238\u7EC4\u5408\u76F8\u5173\u5EA6\u7B49\u56E0\u7D20\u8FDB\u884C\u6295\u8D44\u3002\n\u80A1\u6307\u671F\u8D27\u6295\u8D44\u7B56\u7565\r\n\u672C\u57FA\u91D1\u53EF\u6295\u8D44\u80A1\u6307\u671F\u8D27\u3002\u82E5\u672C\u57FA\u91D1\u6295\u8D44\u80A1\u6307\u671F\u8D27,\u5C06\u6839\u636E\u98CE\u9669\u7BA1\u7406\u7684\u539F\u5219,\u7EFC\u5408\u8003\u8651\u6D41\u52A8\u6027\u3001\u57FA\u5DEE\u6C34\u5E73\u3001\u4E0E\u80A1\u7968\u7EC4\u5408\u76F8\u5173\u5EA6\u7B49\u56E0\u7D20\u8FDB\u884C\u6295\u8D44\u3002\n\u80A1\u7968\u671F\u6743\u6295\u8D44\u7B56\u7565\r\n\u672C\u57FA\u91D1\u53EF\u6295\u8D44\u80A1\u7968\u671F\u6743\u3002\u82E5\u672C\u57FA\u91D1\u6295\u8D44\u80A1\u7968\u671F\u6743,\u5C06\u6839\u636E\u98CE\u9669\u7BA1\u7406\u7684\u539F\u5219,\u7EFC\u5408\u8003\u8651\u6D41\u52A8\u6027\u3001\u4EF7\u683C\u7B49\u56E0\u7D20\u8FDB\u884C\u6295\u8D44\u3002\n\u503A\u5238\u6295\u8D44\u7B56\u7565\r\n\u5728\u503A\u5238\u6295\u8D44\u65B9\u9762,\u672C\u57FA\u91D1\u5C06\u4E3B\u8981\u901A\u8FC7\u7C7B\u5C5E\u914D\u7F6E\u4E0E\u5238\u79CD\u9009\u62E9\u4E24\u4E2A\u5C42\u6B21\u8FDB\u884C\u6295\u8D44\u7BA1\u7406\u3002\r\n\u5728\u7C7B\u5C5E\u914D\u7F6E\u5C42\u6B21,\u672C\u57FA\u91D1\u7ED3\u5408\u5BF9\u5B8F\u89C2\u7ECF\u6D4E\u3001\u5E02\u573A\u5229\u7387\u3001\u4F9B\u6C42\u53D8\u5316\u7B49\u56E0\u7D20\u7684\u7EFC\u5408\u5206\u6790,\u5BF9\u6295\u8D44\u7EC4\u5408\u7C7B\u5C5E\u8D44\u4EA7\u8FDB\u884C\u4F18\u5316\u914D\u7F6E\u548C\u8C03\u6574,\u786E\u5B9A\u7C7B\u5C5E\u8D44\u4EA7\u7684\u6743\u91CD\u3002\r\n\u5728\u5238\u79CD\u9009\u62E9\u4E0A,\u672C\u57FA\u91D1\u4EE5\u957F\u671F\u5229\u7387\u8D8B\u52BF\u5206\u6790\u4E3A\u57FA\u7840,\u7ED3\u5408\u7ECF\u6D4E\u53D8\u5316\u8D8B\u52BF\u3001\u8D27\u5E01\u653F\u7B56\u53CA\u4E0D\u540C\u503A\u5238\u54C1\u79CD\u7684\u6536\u76CA\u7387\u6C34\u5E73\u3001\u6D41\u52A8\u6027\u548C\u4FE1\u7528\u98CE\u9669\u7B49\u56E0\u7D20,\u5B9E\u65BD\u6295\u8D44\u7BA1\u7406\u3002\r\n
        \                                   </p>\r\n                                </div>\r\n
