# Alembic configuration for the Fund Quant Platform backend.
#
# The database URL is deliberately *not* set here. `migrations/env.py`
# reads it from `app.core.config.Settings.database_sync_url` so a single
# environment variable (`DATABASE_SYNC_URL`) drives every runtime path.
# Leaving `sqlalchemy.url` empty also prevents accidental leakage of
# credentials into version control.

[alembic]
# Location of the migration scripts relative to this file.
script_location = migrations

# Template used by `alembic revision` to create a new version file.
# `%%(rev)s` and `%%(slug)s` are substituted by Alembic.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone used in migration filenames / headers. UTC keeps version
# files sortable across contributors in different regions.
timezone = UTC

# Number of characters from the message kept in the filename slug.
truncate_slug_length = 40

# Emit `alembic_version` table in the `public` schema (PostgreSQL
# default). Overridable per-deployment through env.py if needed.
version_table = alembic_version
version_table_schema =

# Absolute path prefix for `script_location`. Leaving this blank makes
# the path resolution anchored to `alembic.ini`, which is exactly what
# we want when running both locally and inside the Docker image.
prepend_sys_path = .
path_separator = os

# Leave empty; env.py sources the URL from Settings.
sqlalchemy.url =


[post_write_hooks]
# Automatically run Ruff + Black on newly generated migration scripts
# so they match repository style. Hooks are best-effort: if the tool
# is missing (e.g. in a minimal CI stage) Alembic skips silently.
hooks = ruff, black

ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

black.type = console_scripts
black.entrypoint = black
black.options = -q REVISION_SCRIPT_FILENAME


# ---------------------------------------------------------------------
# Logging: mirrors structlog levels used by the app itself.
# ---------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
